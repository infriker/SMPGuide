name: "Баг-репорт"
description: "Сообщить об ошибке в приложении"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: Что произошло?
      description: Опишите ошибку как можно подробнее
      placeholder: "При открытии шаблона карты вызова приложение закрывается"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Что ожидалось?
      description: Опишите ожидаемое поведение
      placeholder: "Шаблон должен открыться в WebView"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги для воспроизведения
      description: Как воспроизвести ошибку?
      placeholder: |
        1. Открыть приложение
        2. Перейти в раздел «Карты вызова»
        3. Нажать на «Острый аппендицит»
        4. Приложение закрывается
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Версия Android
      placeholder: "Android 13"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Модель устройства
      placeholder: "Samsung Galaxy A54"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Скриншоты
      description: Прикрепите скриншоты, если применимо
    validations:
      required: false
