name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version from tag or input
        id: get_version_early
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
          else
            RAW_VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading 'v' for versionName
          VERSION_NAME="${RAW_VERSION#v}"
          # Compute versionCode from semver: MAJOR*10000 + MINOR*100 + PATCH
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          MAJOR="${MAJOR:-0}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-1}"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "raw_version=$RAW_VERSION" >> $GITHUB_OUTPUT

      - name: Build Release APK
        env:
          APP_VERSION_NAME: ${{ steps.get_version_early.outputs.version_name }}
          APP_VERSION_CODE: ${{ steps.get_version_early.outputs.version_code }}
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename signed APK
        run: |
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" \
            "app/build/outputs/apk/release/SMPGuide-${{ steps.get_version_early.outputs.raw_version }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version_early.outputs.raw_version }}
          name: SMPGuide ${{ steps.get_version_early.outputs.raw_version }}
          body: |
            ## Что нового
            _Опишите изменения в этом релизе._

            ## Установка
            Скачайте APK файл ниже и установите на Android устройство (Android 7.0+).
            Перед установкой может потребоваться разрешить установку из неизвестных источников.
          files: app/build/outputs/apk/release/SMPGuide-${{ steps.get_version_early.outputs.raw_version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
