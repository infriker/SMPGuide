<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding: 16px; color: #333; line-height: 1.6; }
h1 { color: #D32F2F; font-size: 22px; border-bottom: 2px solid #D32F2F; padding-bottom: 8px; }
h2 { color: #D32F2F; font-size: 16px; margin-top: 18px; }
.info { background: #FFF8F8; border-left: 4px solid #D32F2F; border-radius: 4px; padding: 12px 16px; margin: 10px 0; }
ul { padding-left: 20px; }
li { margin-bottom: 8px; }
</style>
</head>
<body>
<h1>Гололёд — информация для примечаний</h1>

<h2>При падении на гололёде необходимо вносить в примечания</h2>
<div class="info">
  <ul>
    <li><strong>Дата и время падения</strong></li>
    <li><strong>Точное место падения</strong></li>
    <li><strong>Полностью развёрнутый диагноз</strong></li>
    <li><strong>Согласие пациента</strong> на передачу данных в муниципальные органы</li>
  </ul>
</div>
</body>
</html>
